<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>open-videocore ops</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="detail-standalone">
  <!--
    Standalone (detached) detail view — issue #128. Renders exactly ONE asset or
    job detail with MINIMAL CHROME: no global header, no tab bar, no nav. Just a
    thin context strip (the stack label) plus the reused detail pane. It
    self-polls at the shared main-UI interval and intentionally does NOT boot the
    full tab UI (importing app.js here only reuses its renderers). No shared
    module state with the opener window.
  -->
  <main>
    <div id="detail-stack-label" class="detail-standalone-context"></div>
    <div id="content" class="content-fullbleed">
      <div class="assets-side" id="detail-root" style="display:flex;"></div>
    </div>
  </main>

  <script type="module" src="detail.js"></script>
</body>
</html>
