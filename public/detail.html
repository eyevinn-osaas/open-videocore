<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>open-videocore ops</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!--
    Standalone (detached) detail view. Renders exactly ONE asset or job detail,
    self-polling at the shared main-UI interval. It intentionally does NOT set
    window.__OPS_MAIN__, so importing app.js here reuses its renderers without
    booting the full tab UI. No shared module state with the opener window.
  -->
  <header>
    <div class="header-brand">open-videocore ops</div>
    <nav class="header-nav">
      <span id="detail-stack-label" class="header-label"></span>
    </nav>
  </header>

  <main>
    <div id="content" class="content-fullbleed">
      <div class="assets-side" id="detail-root" style="display:flex;"></div>
    </div>
  </main>

  <script type="module" src="detail.js"></script>
</body>
</html>
